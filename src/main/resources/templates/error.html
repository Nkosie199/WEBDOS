<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Error — WebDocs</title>
    <style>
        :root { --bg: #0d1b2a; --card: #122535; --accent: #0a9396; --text: #e0f7f4; --border: #1e3a4a; --muted: #83c5be; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
        .logo { font-size: 2rem; font-weight: 800; letter-spacing: 2px; margin-bottom: 2rem; }
        .logo span { color: var(--muted); }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 3rem; max-width: 520px; width: 100%; text-align: center; }
        .status-code { font-size: 5rem; font-weight: 900; color: var(--accent); line-height: 1; margin-bottom: 0.5rem; }
        h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem; }
        p { color: var(--muted); font-size: 0.95rem; line-height: 1.6; margin-bottom: 1.5rem; }
        .btn { display: inline-block; background: var(--accent); color: #fff; padding: 0.7rem 2rem; border-radius: 8px; text-decoration: none; font-weight: 700; font-size: 0.95rem; transition: background 0.2s; margin: 0.3rem; }
        .btn:hover { background: #006d77; }
        .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
        .btn-ghost:hover { background: var(--border); }
        .detail { font-size: 0.78rem; color: #445; margin-top: 1rem; }
    </style>
</head>
<body>
<div class="logo">Web<span>Docs</span></div>
<div class="card">
    <div class="status-code" th:text="${status}">Error</div>
    <h1 th:text="${error ?: 'Something went wrong'}">Something went wrong</h1>
    <p th:text="${message ?: 'An unexpected error occurred. Please try again or go back to the dashboard.'}">
        An unexpected error occurred.
    </p>
    <a href="/" class="btn">🏠 Go to Dashboard</a>
    <a href="/login" class="btn btn-ghost">🔐 Sign In</a>
    <p class="detail" th:if="${trace}" th:text="'Path: ' + ${path}"></p>
</div>
</body>
</html>
