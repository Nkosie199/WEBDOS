server:
  port: 5555
  ssl:
    enabled: true
    key-store: classpath:keystore.p12
    key-store-password: webdocs2026
    key-store-type: PKCS12
    key-alias: webdocs
  http2:
    enabled: true
  servlet:
    session:
      cookie:
        secure: true
        http-only: true
        same-site: strict

spring:
  application:
    name: webdocs
  thymeleaf:
    cache: false
  session:
    store-type: none
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

webdocs:
  mynger-api-url: https://api.mynger.com
  deepdiary-api-url: https://api.deepdiary.mynger.com
  output-dir: ${java.io.tmpdir}/webdocs-output

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
