name: Build & Deploy — WebDocs

on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Java 23 ─────────────────────────────────────────────────
      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'

      # ── 3. Build ───────────────────────────────────────────────────
      - name: Build JAR
        run: mvn package -DskipTests --no-transfer-progress

      # ── 4. Upload artifact ─────────────────────────────────────────
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: webdocs-${{ github.sha }}
          path: target/webdocs-1.0.0.jar
          retention-days: 10

      # ── 5. Deploy via SSH ──────────────────────────────────────────
      # Secrets required (set in GitHub → Settings → Secrets):
      #   DEPLOY_HOST  — your public IP or domain
      #   DEPLOY_USER  — SSH username
      #   DEPLOY_KEY   — private SSH key
      #   DEPLOY_PORT  — SSH port (default 22)
      - name: Deploy to production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_KEY }}
          port:     ${{ secrets.DEPLOY_PORT }}
          script: |
            set -e
            DEPLOY_DIR="/home/adam2/deployments/webdocs"
            JAR_NAME="webdocs-1.0.0.jar"
            JAR_PATH="$DEPLOY_DIR/$JAR_NAME"
            PREV_JAR="$DEPLOY_DIR/webdocs-previous.jar"
            LOG="$DEPLOY_DIR/deploy.log"

            mkdir -p "$DEPLOY_DIR"
            echo "[$(date)] Deploy started — sha=${{ github.sha }}" >> "$LOG"

            # ── Pull latest code ──────────────────────────────────────
            cd /home/adam2/webdocs-src
            git pull origin master

            # ── Build fresh JAR ───────────────────────────────────────
            mvn package -DskipTests --no-transfer-progress

            # ── Backup previous JAR ───────────────────────────────────
            if [ -f "$JAR_PATH" ]; then
              cp "$JAR_PATH" "$PREV_JAR"
              echo "[$(date)] Previous JAR backed up" >> "$LOG"
            fi

            # ── Copy new JAR ──────────────────────────────────────────
            cp target/$JAR_NAME "$JAR_PATH"

            # ── Stop old app ──────────────────────────────────────────
            pkill -f "$JAR_NAME" 2>/dev/null || true
            sleep 3

            # ── Start new app ─────────────────────────────────────────
            nohup java -jar "$JAR_PATH" \
              >> "$DEPLOY_DIR/app.log" 2>&1 &

            # ── Health check (30s window) ─────────────────────────────
            echo "[$(date)] Waiting for health check..." >> "$LOG"
            sleep 15
            for i in 1 2 3; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://localhost:5555/actuator/health -k || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "[$(date)] Health check passed (attempt $i)" >> "$LOG"
                exit 0
              fi
              sleep 5
            done

            # ── ROLLBACK ─────────────────────────────────────────────
            echo "[$(date)] Health check FAILED — rolling back" >> "$LOG"
            pkill -f "$JAR_NAME" 2>/dev/null || true
            sleep 2
            if [ -f "$PREV_JAR" ]; then
              cp "$PREV_JAR" "$JAR_PATH"
              nohup java -jar "$JAR_PATH" \
                >> "$DEPLOY_DIR/app.log" 2>&1 &
              echo "[$(date)] Rolled back to previous JAR" >> "$LOG"
            fi
            exit 1
